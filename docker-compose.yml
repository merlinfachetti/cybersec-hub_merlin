services:
  postgres:
    image: postgres:16-alpine
    container_name: cybersec-hub-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: cybersec
      POSTGRES_PASSWORD: cybersec123
      POSTGRES_DB: cybersec_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cybersec']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
