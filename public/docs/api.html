<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYBERSEC LAB — API Reference</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #0b0f14; }
    .swagger-ui { background: #0b0f14; }
    .swagger-ui .topbar { background: #0a0814; border-bottom: 1px solid rgba(139,92,246,0.2); }
    .swagger-ui .topbar .download-url-wrapper { display: none; }
    .swagger-ui .info h2 { color: #f0eeff; font-family: 'Space Grotesk', sans-serif; }
    .swagger-ui .info p, .swagger-ui .info li { color: rgba(155,176,198,0.7); }
    .swagger-ui .scheme-container { background: #0a0814; }
    .swagger-ui section.models { background: #0a0814; }
    .swagger-ui .model-box { background: rgba(15,10,35,0.8); }
    .swagger-ui .opblock-tag { color: #e6eef8; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .swagger-ui .opblock.opblock-post .opblock-summary { background: rgba(34,197,94,0.06); }
    .swagger-ui .opblock.opblock-get .opblock-summary { background: rgba(59,130,246,0.06); }
    .topbar-brand { display: flex; align-items: center; gap: 10px; padding: 10px 20px; }
    .topbar-brand img { width: 28px; height: 28px; filter: drop-shadow(0 0 6px rgba(139,92,246,0.5)); }
    .topbar-brand span { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.12em; color: #f0eeff; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: '/swagger.json',
        dom_id: '#swagger-ui',
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        deepLinking: true,
        tryItOutEnabled: true,
        requestSnippetsEnabled: true,
        filter: true,
      });
    };
  </script>
</body>
</html>
